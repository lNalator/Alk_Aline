name: Build Vite App artifact and publish it as a GitHub Pages site

on:
  push:
    branches: ['main']

  workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7 # v7
      - name: Set up Node
        uses: actions/setup-node@v6 # v6
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v6 # v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5 # v5
        with:
          # Upload dist folder
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5 # v5